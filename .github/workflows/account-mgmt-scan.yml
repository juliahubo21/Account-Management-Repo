name: Account Management Daily Scan

# Multiple cron fires per day act as redundancy against GitHub Actions
# scheduling unreliability — at least one is virtually guaranteed to run.
# scripts/scan.py dedupes posts via Slack channel history markers, so
# repeated runs on the same day post nothing duplicate.

on:
  schedule:
    - cron: '23 13 * * *'  # 13:23 UTC = 09:23 EDT / 08:23 EST
    - cron: '23 15 * * *'  # 15:23 UTC = 11:23 EDT / 10:23 EST
    - cron: '23 17 * * *'  # 17:23 UTC = 13:23 EDT / 12:23 EST
    - cron: '23 19 * * *'  # 19:23 UTC = 15:23 EDT / 14:23 EST
    - cron: '23 21 * * *'  # 21:23 UTC = 17:23 EDT / 16:23 EST

  workflow_dispatch:

concurrency:
  group: account-mgmt-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Verify Slack bot token
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          AUTH=$(curl -sS -X POST -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            https://slack.com/api/auth.test)
          OK=$(echo "$AUTH" | jq -r .ok)
          if [ "$OK" != "true" ]; then
            ERR=$(echo "$AUTH" | jq -r .error)
            echo "::error::Slack auth.test failed: $ERR"
            exit 1
          fi
          echo "Slack auth ok: team $(echo "$AUTH" | jq -r .team), bot $(echo "$AUTH" | jq -r .user)"

      - name: Verify Affinity REST API
        env:
          AFFINITY_API_KEY: ${{ secrets.AFFINITY_API_KEY }}
        run: |
          HTTP_CODE=$(curl -sS -o /tmp/whoami.json -w "%{http_code}" \
            -u ":$AFFINITY_API_KEY" "https://api.affinity.co/auth/whoami")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Affinity /auth/whoami returned HTTP $HTTP_CODE"
            cat /tmp/whoami.json
            exit 1
          fi
          echo "Affinity auth ok"

      - name: Run daily scan
        env:
          AFFINITY_API_KEY: ${{ secrets.AFFINITY_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_NAME: account-management
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python scripts/scan.py
