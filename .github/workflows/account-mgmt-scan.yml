name: Account Management Daily Scan

on:
  schedule:
    # 14:00 UTC = 10:00 EDT (summer)
    - cron: '0 14 * * *'
    # 15:00 UTC = 10:00 EST (winter)
    - cron: '0 15 * * *'
  workflow_dispatch:

concurrency:
  group: account-mgmt-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Gate to 10:00 America/New_York
        # Both crons fire daily; only proceed when local NY hour is 10.
        # workflow_dispatch bypasses the gate.
        if: github.event_name == 'schedule'
        run: |
          NY_HOUR=$(TZ=America/New_York date +%H)
          if [ "$NY_HOUR" != "10" ]; then
            echo "Local hour in America/New_York is $NY_HOUR; skipping (only run at 10)."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        if: env.SKIP != '1'
        uses: actions/checkout@v4

      - name: Set up Node
        if: env.SKIP != '1'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python (for uvx / Affinity MCP)
        if: env.SKIP != '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv (provides uvx)
        if: env.SKIP != '1'
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Claude Code CLI
        if: env.SKIP != '1'
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify Slack bot token
        if: env.SKIP != '1'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          AUTH=$(curl -sS -X POST -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            https://slack.com/api/auth.test)
          OK=$(echo "$AUTH" | jq -r .ok)
          if [ "$OK" != "true" ]; then
            ERR=$(echo "$AUTH" | jq -r .error)
            echo "::error::Slack auth.test failed: $ERR"
            exit 1
          fi
          echo "Slack auth ok: team $(echo "$AUTH" | jq -r .team), bot $(echo "$AUTH" | jq -r .user)"

      - name: Render .mcp.json from template
        if: env.SKIP != '1'
        env:
          AFFINITY_API_KEY: ${{ secrets.AFFINITY_API_KEY }}
        run: |
          envsubst < .mcp.json.tmpl > .mcp.json
          # Sanity check: tokens must have been substituted.
          if grep -q '\${' .mcp.json; then
            echo "::error::.mcp.json still has unsubstituted variables — secret missing?"
            exit 1
          fi

      - name: Run daily scan
        if: env.SKIP != '1'
        timeout-minutes: 10
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_NAME: account-management
        run: |
          echo "=== Sanity check: claude auth, no MCP ==="
          timeout 60 claude --print "Reply with only the word ok" \
            || { echo "::error::Auth sanity check failed — OAuth token rejected, or network blocked"; exit 1; }
          echo ""
          echo "=== Running full scan with --debug ==="
          timeout 480 claude \
            --print \
            --debug \
            --strict-mcp-config \
            --mcp-config .mcp.json \
            --permission-mode acceptEdits \
            --allowed-tools "mcp__affinity-mcp__*,Bash(date:*),Bash(curl:*),Bash(jq:*),Bash(echo:*),Bash(printf:*)" \
            < prompts/daily-scan.md

      - name: Cleanup rendered .mcp.json
        if: always()
        run: rm -f .mcp.json
