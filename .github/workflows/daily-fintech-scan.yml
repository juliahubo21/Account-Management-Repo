name: Daily Fintech Market Scan

# Single daily cron at 13:23 UTC (09:23 EDT / 08:23 EST).
# daily_fintech_scan.py dedupes posts via Slack channel history (last 7 days),
# normalizing URLs and titles to prevent the same article from posting twice.

on:
  schedule:
    - cron: '23 13 * * *'  # 13:23 UTC = 09:23 EDT / 08:23 EST
  workflow_dispatch:

concurrency:
  group: daily-fintech-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Verify Slack bot token
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          AUTH=$(curl -sS -X POST -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            https://slack.com/api/auth.test)
          OK=$(echo "$AUTH" | jq -r .ok)
          if [ "$OK" != "true" ]; then
            ERR=$(echo "$AUTH" | jq -r .error)
            echo "::error::Slack auth.test failed: $ERR"
            exit 1
          fi
          echo "Slack auth ok: team $(echo "$AUTH" | jq -r .team), bot $(echo "$AUTH" | jq -r .user)"

      - name: Run market scan
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: C0APAPQRTPC
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PITCHBOOK_MCP_SERVER_URL: ${{ secrets.PITCHBOOK_MCP_SERVER_URL }}
          PITCHBOOK_MCP_AUTH_TOKEN: ${{ secrets.PITCHBOOK_MCP_AUTH_TOKEN }}
        run: python market_scan/daily_fintech_scan.py
