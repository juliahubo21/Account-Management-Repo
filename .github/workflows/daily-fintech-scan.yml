name: Daily Fintech Market Scan

# Multiple cron fires per day act as redundancy against GitHub Actions
# scheduling unreliability — at least one is virtually guaranteed to run.
# daily_fintech_scan.py dedupes posts via Slack channel history, so
# repeated runs on the same day post nothing duplicate.

on:
  schedule:
    - cron: '7 13 * * *'   # 13:07 UTC = 09:07 EDT / 08:07 EST
    - cron: '7 15 * * *'   # 15:07 UTC = 11:07 EDT / 10:07 EST
    - cron: '7 17 * * *'   # 17:07 UTC = 13:07 EDT / 12:07 EST
    - cron: '7 19 * * *'   # 19:07 UTC = 15:07 EDT / 14:07 EST
    - cron: '7 21 * * *'   # 21:07 UTC = 17:07 EDT / 16:07 EST
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print message without posting to Slack'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Required secrets:
#   SLACK_BOT_TOKEN          — Slack bot token for Julia's App (xoxb-...)
#
# Optional secrets (enable live Pitchbook data via MCP):
#   ANTHROPIC_API_KEY        — Anthropic API key
#   PITCHBOOK_MCP_SERVER_URL — Pitchbook MCP server URL
#   PITCHBOOK_MCP_AUTH_TOKEN — Auth token for the Pitchbook MCP server

jobs:
  post-market-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser beautifulsoup4 python-dateutil pytz anthropic

      - name: Run market scan and post to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: C0APAPQRTPC
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PITCHBOOK_MCP_SERVER_URL: ${{ secrets.PITCHBOOK_MCP_SERVER_URL }}
          PITCHBOOK_MCP_AUTH_TOKEN: ${{ secrets.PITCHBOOK_MCP_AUTH_TOKEN }}
        run: python market_scan/daily_fintech_scan.py
