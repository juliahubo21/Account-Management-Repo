name: Daily Fintech Market Scan

# Multiple cron fires per day act as redundancy against GitHub Actions
# scheduling unreliability — at least one is virtually guaranteed to run.
# daily_fintech_scan.py dedupes posts via Slack channel history, so
# repeated runs on the same day post nothing duplicate.

on:
  schedule:
    - cron: '23 13 * * *'  # 13:23 UTC = 09:23 EDT / 08:23 EST
    - cron: '23 15 * * *'  # 15:23 UTC = 11:23 EDT / 10:23 EST
    - cron: '23 17 * * *'  # 17:23 UTC = 13:23 EDT / 12:23 EST
    - cron: '23 19 * * *'  # 19:23 UTC = 15:23 EDT / 14:23 EST
    - cron: '23 21 * * *'  # 21:23 UTC = 17:23 EDT / 16:23 EST
  workflow_dispatch:

concurrency:
  group: daily-fintech-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Verify Slack bot token
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          AUTH=$(curl -sS -X POST -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            https://slack.com/api/auth.test)
          OK=$(echo "$AUTH" | jq -r .ok)
          if [ "$OK" != "true" ]; then
            ERR=$(echo "$AUTH" | jq -r .error)
            echo "::error::Slack auth.test failed: $ERR"
            exit 1
          fi
          echo "Slack auth ok: team $(echo "$AUTH" | jq -r .team), bot $(echo "$AUTH" | jq -r .user)"

      - name: Run market scan
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: C0APAPQRTPC
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PITCHBOOK_MCP_SERVER_URL: ${{ secrets.PITCHBOOK_MCP_SERVER_URL }}
          PITCHBOOK_MCP_AUTH_TOKEN: ${{ secrets.PITCHBOOK_MCP_AUTH_TOKEN }}
        run: python market_scan/daily_fintech_scan.py
