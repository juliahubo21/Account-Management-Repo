name: Account Management Weekly Summary

on:
  schedule:
    - cron: '7 15 * * 5'
    # 15:07 UTC = 11:07 EDT (summer)
    - cron: '7 16 * * 5'
    # 16:07 UTC = 11:07 EST (winter)

  workflow_dispatch:

concurrency:
  group: account-mgmt-weekly
  cancel-in-progress: false

jobs:
  weekly-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Gate to 11:00 America/New_York
        # Both crons fire on Fridays; only proceed when local NY hour is 11.
        # workflow_dispatch bypasses the gate.
        if: github.event_name == 'schedule'
        run: |
          NY_HOUR=$(TZ=America/New_York date +%H)
          if [ "$NY_HOUR" != "11" ]; then
            echo "Local hour in America/New_York is $NY_HOUR; skipping (only run at 11)."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        if: env.SKIP != '1'
        uses: actions/checkout@v4

      - name: Set up Python
        if: env.SKIP != '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        if: env.SKIP != '1'
        run: pip install -r requirements.txt

      - name: Verify Slack bot token
        if: env.SKIP != '1'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          AUTH=$(curl -sS -X POST -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            https://slack.com/api/auth.test)
          OK=$(echo "$AUTH" | jq -r .ok)
          if [ "$OK" != "true" ]; then
            ERR=$(echo "$AUTH" | jq -r .error)
            echo "::error::Slack auth.test failed: $ERR"
            exit 1
          fi
          echo "Slack auth ok: team $(echo "$AUTH" | jq -r .team), bot $(echo "$AUTH" | jq -r .user)"

      - name: Verify Affinity REST API
        if: env.SKIP != '1'
        env:
          AFFINITY_API_KEY: ${{ secrets.AFFINITY_API_KEY }}
        run: |
          HTTP_CODE=$(curl -sS -o /tmp/whoami.json -w "%{http_code}" \
            -u ":$AFFINITY_API_KEY" "https://api.affinity.co/auth/whoami")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Affinity /auth/whoami returned HTTP $HTTP_CODE"
            cat /tmp/whoami.json
            exit 1
          fi
          echo "Affinity auth ok"

      - name: Run weekly summary
        if: env.SKIP != '1'
        env:
          AFFINITY_API_KEY: ${{ secrets.AFFINITY_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_NAME: account-management
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python scripts/weekly_summary.py
